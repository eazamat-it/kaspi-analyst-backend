<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - MarketAnalyst.kz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e5e7eb; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; color: #f97316; }
        .card { background: #1a2332; border: 1px solid #2d3e4f; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .card h2 { color: #f97316; margin-bottom: 20px; font-size: 20px; }
        .upload-area { border: 2px dashed #f97316; border-radius: 12px; padding: 50px; text-align: center; cursor: pointer; }
        .upload-area:hover { background: rgba(249, 115, 22, 0.1); }
        .file-input { display: none; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; font-weight: 600; }
        .form-group select { width: 100%; padding: 10px 12px; background: #0f1419; border: 1px solid #2d3e4f; border-radius: 6px; color: #e5e7eb; }
        .form-group select:focus { outline: none; border-color: #f97316; }
        .btn { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        .btn-block { width: 100%; padding: 14px; margin-top: 16px; }
        .item { background: #0f1419; padding: 14px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .item-name { font-weight: 600; }
        .item-details { font-size: 12px; color: #9ca3af; }
        .status { font-weight: 700; }
        .ok { color: #10b981; }
        .low { color: #f59e0b; }
        .error { color: #ef4444; }
        .results { margin-top: 20px; display: none; }
        .success-msg { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #a7f3d0; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
        .settings-block { background: #0f1419; border: 1px solid #2d3e4f; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 MarketAnalyst.kz</h1>
            <p style="color: #9ca3af; margin-top: 8px;">Загрузи товары и получи рекомендации по ценам</p>
        </div>
        
        <div class="card">
            <h2>⚙️ Настройки уведомлений</h2>
            
            <div class="settings-block">
                <div class="form-group">
                    <label>🔔 Во сколько приходят уведомления в Telegram?</label>
                    <select id="notificationHour">
                        <option value="0">00:00 (полночь)</option>
                        <option value="2" selected>02:00 (2 ночи)</option>
                        <option value="4">04:00 (4 ночи)</option>
                        <option value="6">06:00 (6 утра)</option>
                        <option value="8">08:00 (8 утра)</option>
                        <option value="10">10:00 (10 утра)</option>
                        <option value="12">12:00 (полдень)</option>
                        <option value="14">14:00 (2 дня)</option>
                        <option value="16">16:00 (4 дня)</option>
                        <option value="18">18:00 (6 вечера)</option>
                        <option value="20">20:00 (8 вечера)</option>
                        <option value="22">22:00 (10 вечера)</option>
                    </select>
                </div>
                <button class="btn" onclick="saveNotificationTime()" style="width: 100%;">✅ Сохранить время</button>
            </div>
        </div>
        
        <div class="card">
            <h2>📥 Загрузка товаров из Excel</h2>
            
            <button class="btn" onclick="downloadTemplate()" style="margin-bottom: 20px;">📥 Скачать шаблон Excel</button>
            
            <div class="upload-area" id="uploadArea" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('excelFile').click()">
                <div style="font-size: 48px; margin-bottom: 12px;">📁</div>
                <div style="font-size: 18px; font-weight: 600; color: #f97316; margin-bottom: 4px;">Перетащите Excel сюда</div>
                <div style="font-size: 13px; color: #9ca3af;">или нажмите чтобы выбрать файл</div>
                <input type="file" id="excelFile" class="file-input" accept=".xlsx,.xls" onchange="handleFileSelect(event)">
            </div>
            
            <div class="results" id="results">
                <div class="success-msg" id="successMsg" style="display:none;"></div>
                <h3 style="color: #f97316; margin-bottom: 12px;">✅ Загруженные товары:</h3>
                <div id="itemsList"></div>
                <button class="btn btn-block" id="saveBtn" onclick="saveAllProducts()">💾 Сохранить товары</button>
            </div>
        </div>
    </div>
    
    <script>
        let allProducts = [];
        let currentSellerId = 'user_' + Math.random().toString(36).substr(2, 9);
        
        function saveNotificationTime() {
            const hour = document.getElementById('notificationHour').value;
            console.log('💾 Сохраняю время уведомлений:', hour + ':00');
            
            fetch('https://api.marketanalyst.kz/api/seller/set-notification-time', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    seller_id: currentSellerId,
                    notification_hour: parseInt(hour)
                })
            })
            .then(r => r.json())
            .then(data => {
                console.log('Response:', data);
                if (data.status === 'success') {
                    alert(`✅ Время уведомлений установлено на ${hour}:00`);
                } else {
                    alert('❌ Ошибка: ' + data.message);
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('⚠️ Ошибка подключения');
            });
        }
        
        function downloadTemplate() {
            const data = [
                ['Название товара', 'Закупочная цена', 'ВАША цена', 'Минимальная цена', 'Доставка', 'Комиссия %', 'Kaspi Жұма'],
                ['Apple iPhone 15 Pro', 750000, 900000, 870000, 700, 11, 'ДА'],
                ['Samsung Galaxy S24', 680000, 820000, 750000, 700, 11, 'НЕТ'],
                ['Corsair M65 RGB', 25000, 45000, 40000, 700, 15, 'НЕТ']
            ];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Товары');
            XLSX.writeFile(wb, 'MarketAnalyst_Template.xlsx');
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('uploadArea').style.background = 'rgba(249, 115, 22, 0.15)';
        }
        
        function handleDragLeave(e) {
            document.getElementById('uploadArea').style.background = '';
        }
        
        function handleDrop(e) {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) {
                processExcel(e.dataTransfer.files[0]);
            }
        }
        
        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                processExcel(e.target.files[0]);
            }
        }
        
        function processExcel(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(worksheet);
                    
                    allProducts = rows;
                    console.log('✅ Загружено товаров:', rows.length);
                    displayProducts(rows);
                } catch (err) {
                    console.error('❌ Ошибка Excel:', err);
                    alert('Ошибка: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                const cost = parseInt(p['Закупочная цена']) || 0;
                const price = parseInt(p['ВАША цена']) || 0;
                const delivery = parseInt(p['Доставка']) || 700;
                const commission = parseFloat(p['Комиссия %']) || 15;
                
                const profit = price - Math.round(price * (commission / 100)) - Math.round(price * 0.03) - delivery - cost;
                const margin = price > 0 ? ((profit / price) * 100).toFixed(1) : 0;
                
                let status = profit < 0 ? '❌ УБЫТОК' : margin < 15 ? '⚠️ НИЗКО' : '✅ OK';
                let statusClass = profit < 0 ? 'error' : margin < 15 ? 'low' : 'ok';
                
                html += `<div class="item">
                    <div>
                        <div class="item-name">${p['Название товара']}</div>
                        <div class="item-details">Прибыль: ${profit.toLocaleString()}₸ | Маржа: ${margin}%</div>
                    </div>
                    <div class="status ${statusClass}">${status}</div>
                </div>`;
            });
            
            document.getElementById('itemsList').innerHTML = html;
            document.getElementById('results').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function saveAllProducts() {
            if (allProducts.length === 0) {
                alert('Нет товаров');
                return;
            }
            
            console.log('📤 Сохраняю товары:', allProducts.length);
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('saveBtn').textContent = '⏳ Сохранение...';
            
            const hour = document.getElementById('notificationHour').value;
            
            fetch('https://api.marketanalyst.kz/api/seller/save-products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    seller_id: currentSellerId,
                    products: allProducts,
                    notification_hour: parseInt(hour)
                })
            })
            .then(r => {
                console.log('Status:', r.status);
                return r.json();
            })
            .then(data => {
                console.log('Response:', data);
                if (data.status === 'success') {
                    document.getElementById('successMsg').innerHTML = `✅ Сохранено товаров: ${data.count}! Уведомления в ${hour}:00`;
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('saveBtn').textContent = '✅ Сохранено!';
                } else {
                    alert('Ошибка: ' + data.message);
                }
            })
            .catch(err => {
                console.error('Fetch error:', err);
                alert('Ошибка: ' + err.message);
            })
            .finally(() => {
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').textContent = '💾 Сохранить товары';
            });
        }
    </script>
</body>
</html>
