<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - MarketAnalyst.kz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e5e7eb; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; color: #f97316; }
        .header a { background: #f97316; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; }
        .card { background: #1a2332; border: 1px solid #2d3e4f; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .card h2 { color: #f97316; margin-bottom: 20px; font-size: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: #0f1419; border: 1px solid #2d3e4f; border-radius: 6px; color: #e5e7eb; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #f97316; }
        .btn { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        .btn-block { width: 100%; padding: 14px; margin-top: 16px; }
        .item { background: #0f1419; padding: 14px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .item-name { font-weight: 600; }
        .item-details { font-size: 12px; color: #9ca3af; }
        .status { font-weight: 700; }
        .ok { color: #10b981; }
        .low { color: #f59e0b; }
        .error { color: #ef4444; }
        .results { margin-top: 20px; display: none; }
        .success-msg { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #a7f3d0; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
        .settings-block { background: #0f1419; border: 1px solid #2d3e4f; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .search-results { background: #0f1419; border: 1px solid #2d3e4f; border-radius: 8px; padding: 12px; margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .search-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #2d3e4f; }
        .search-item:hover { background: #1a2332; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 MarketAnalyst.kz</h1>
            <a href="app.html">← На главную</a>
        </div>
        
        <div class="card">
            <h2>⚙️ Настройки уведомлений</h2>
            <div class="settings-block">
                <div class="form-group">
                    <label>🔔 Во сколько приходят уведомления в Telegram?</label>
                    <select id="notificationHour">
                        <option value="0">00:00 (полночь)</option>
                        <option value="2" selected>02:00 (2 ночи)</option>
                        <option value="4">04:00 (4 ночи)</option>
                        <option value="6">06:00 (6 утра)</option>
                        <option value="8">08:00 (8 утра)</option>
                        <option value="10">10:00 (10 утра)</option>
                        <option value="12">12:00 (полдень)</option>
                        <option value="14">14:00 (2 дня)</option>
                        <option value="16">16:00 (4 дня)</option>
                        <option value="18">18:00 (6 вечера)</option>
                        <option value="20">20:00 (8 вечера)</option>
                        <option value="22">22:00 (10 вечера)</option>
                    </select>
                </div>
                <button class="btn" onclick="saveNotificationTime()" style="width: 100%;">✅ Сохранить время</button>
            </div>
        </div>
        
        <div class="card">
            <h2>📥 Добавить товары</h2>
            
            <div class="form-group">
                <label>🔍 Название товара на Kaspi</label>
                <input type="text" id="productSearch" placeholder="iPhone 17 Pro Max 256GB" oninput="searchKaspiProduct()">
                <div class="search-results" id="searchResults" style="display: none;"></div>
            </div>
            
            <div class="form-group">
                <label>Закупочная цена (₸)</label>
                <input type="number" id="cost_price" placeholder="750000">
            </div>
            
            <div class="form-group">
                <label>ВАША цена (₸)</label>
                <input type="number" id="selling_price" placeholder="900000">
            </div>
            
            <div class="form-group">
                <label>Минимальная цена (₸)</label>
                <input type="number" id="stop_price" placeholder="870000">
            </div>
            
            <div class="form-group">
                <label>Доставка (₸)</label>
                <input type="number" id="delivery_cost" value="700">
            </div>
            
            <div class="form-group">
                <label>Комиссия Kaspi (%)</label>
                <select id="kaspi_commission">
                    <option value="5">5% (Книги)</option>
                    <option value="10">10% (Электроника)</option>
                    <option value="11">11% (Телефоны)</option>
                    <option value="15" selected>15% (Аксессуары)</option>
                    <option value="18">18% (Авто)</option>
                    <option value="22">22% (Другое)</option>
                </select>
            </div>
            
            <button class="btn btn-block" onclick="addProduct()">➕ Добавить товар</button>
            
            <div class="results" id="results">
                <div class="success-msg" id="successMsg" style="display:none;"></div>
                <h3 style="color: #f97316; margin-bottom: 12px; margin-top: 20px;">✅ Добавленные товары:</h3>
                <div id="itemsList"></div>
                <button class="btn btn-block" id="saveBtn" onclick="saveAllProducts()">💾 Сохранить все товары</button>
            </div>
        </div>
    </div>
    
    <script>
        let allProducts = [];
        let selectedProductId = null;
        let currentSellerId = localStorage.getItem('seller_id');
        if (!currentSellerId) {
            currentSellerId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('seller_id', currentSellerId);
        }
        
        window.addEventListener('load', () => {
            // Загружаем время уведомлений
            fetch(`https://api.marketanalyst.kz/api/seller/get-settings?seller_id=${currentSellerId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.notification_hour) {
                        document.getElementById('notificationHour').value = data.notification_hour;
                    }
                })
                .catch(err => console.log('Info: настройки не найдены'));
            
            // Загружаем товары
            fetch(`https://api.marketanalyst.kz/api/seller/get-products?seller_id=${currentSellerId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success' && data.products.length > 0) {
                        allProducts = data.products;
                        displayProducts(data.products);
                    }
                })
                .catch(err => console.log('Info: товары не найдены'));
        });
        
        function searchKaspiProduct() {
            const query = document.getElementById('productSearch').value;
            if (!query || query.length < 3) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }
            
            console.log('🔍 Ищу:', query);
            
            fetch('https://api.marketanalyst.kz/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: query, limit: 5})
            })
            .then(r => r.json())
            .then(data => {
                if (data.products && data.products.length > 0) {
                    let html = '';
                    data.products.forEach(p => {
                        html += `<div class="search-item" onclick="selectProduct('${p.name}', '${p.id}', ${p.min_price})">
                            <div style="font-weight: 600;">${p.name}</div>
                            <div style="font-size: 12px; color: #9ca3af;">Цена: ${p.min_price.toLocaleString()}₸ - ${p.max_price.toLocaleString()}₸</div>
                        </div>`;
                    });
                    document.getElementById('searchResults').innerHTML = html;
                    document.getElementById('searchResults').style.display = 'block';
                } else {
                    document.getElementById('searchResults').style.display = 'none';
                }
            })
            .catch(err => console.error('Ошибка поиска:', err));
        }
        
        function selectProduct(name, id, avgPrice) {
            document.getElementById('productSearch').value = name;
            selectedProductId = id;
            document.getElementById('searchResults').style.display = 'none';
            console.log('✅ Выбран товар:', name, 'ID:', id);
        }
        
        function saveNotificationTime() {
            const hour = document.getElementById('notificationHour').value;
            fetch('https://api.marketanalyst.kz/api/seller/set-notification-time', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({seller_id: currentSellerId, notification_hour: parseInt(hour)})
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alert(`✅ Время установлено на ${hour}:00`);
                }
            })
            .catch(err => alert('⚠️ Ошибка: ' + err.message));
        }
        
        function addProduct() {
            const name = document.getElementById('productSearch').value;
            const cost = parseInt(document.getElementById('cost_price').value);
            const price = parseInt(document.getElementById('selling_price').value);
            const stop = parseInt(document.getElementById('stop_price').value);
            const delivery = parseInt(document.getElementById('delivery_cost').value) || 700;
            const commission = parseFloat(document.getElementById('kaspi_commission').value);
            
            if (!name || !cost || !price) {
                alert('Заполните обязательные поля');
                return;
            }
            
            const profit = price - Math.round(price * (commission / 100)) - Math.round(price * 0.03) - delivery - cost;
            const margin = ((profit / price) * 100).toFixed(1);
            
            allProducts.push({
                'Название товара': name,
                'Закупочная цена': cost,
                'ВАША цена': price,
                'Минимальная цена': stop || 0,
                'Доставка': delivery,
                'Комиссия %': commission,
                'kaspi_product_id': selectedProductId,
                'profit': profit,
                'margin': margin
            });
            
            displayProducts(allProducts);
            document.getElementById('productSearch').value = '';
            document.getElementById('cost_price').value = '';
            document.getElementById('selling_price').value = '';
            document.getElementById('stop_price').value = '';
            selectedProductId = null;
        }
        
        function displayProducts(products) {
            let html = '';
            products.forEach((p, idx) => {
                const profit = p.profit || (p['ВАША цена'] - Math.round(p['ВАША цена'] * (p['Комиссия %'] / 100)) - Math.round(p['ВАША цена'] * 0.03) - p['Доставка'] - p['Закупочная цена']);
                const margin = p.margin || ((profit / p['ВАША цена']) * 100).toFixed(1);
                const status = profit < 0 ? '❌ УБЫТОК' : margin < 15 ? '⚠️ НИЗКО' : '✅ OK';
                const statusClass = profit < 0 ? 'error' : margin < 15 ? 'low' : 'ok';
                
                html += `<div class="item">
                    <div>
                        <div class="item-name">${p['Название товара']}</div>
                        <div class="item-details">Прибыль: ${profit.toLocaleString()}₸ | Маржа: ${margin}%</div>
                    </div>
                    <div class="status ${statusClass}">${status}</div>
                </div>`;
            });
            
            document.getElementById('itemsList').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }
        
        function saveAllProducts() {
            if (allProducts.length === 0) {
                alert('Нет товаров');
                return;
            }
            
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('saveBtn').textContent = '⏳ Сохранение...';
            const hour = document.getElementById('notificationHour').value;
            
            fetch('https://api.marketanalyst.kz/api/seller/save-products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    seller_id: currentSellerId,
                    products: allProducts,
                    notification_hour: parseInt(hour)
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('successMsg').innerHTML = `✅ Сохранено товаров: ${data.count}! Уведомления в ${hour}:00`;
                    document.getElementById('successMsg').style.display = 'block';
                }
            })
            .catch(err => alert('Ошибка: ' + err.message))
            .finally(() => {
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').textContent = '💾 Сохранить все товары';
            });
        }
    </script>
</body>
</html>
