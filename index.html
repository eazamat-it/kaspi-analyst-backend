<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaspiAnalyst — Анализ ниш Kaspi.kz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060b14;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
input,select{background:#0f172a;border:1px solid #1e2a3a;border-radius:10px;color:#e2e8f0;font-size:14px;padding:0 16px;height:44px;outline:none;width:100%}
input:focus{border-color:#f97316}
button{cursor:pointer;border:none;font-weight:700;font-size:13px;font-family:'Segoe UI',sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:linear-gradient(145deg,#111827,#0f172a);border:1px solid #1e2a3a;border-radius:14px;padding:18px}
.pill{border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;display:inline-block}
.tab{border-radius:9px;padding:7px 16px;font-weight:700;font-size:12px;transition:all .15s;border:1px solid #1e2a3a;background:#0f172a;color:#6b7280}
.tab.on{background:#f97316;border-color:#f97316;color:#fff}
.qbtn{background:#0f172a;border:1px solid #1e2a3a;border-radius:20px;padding:4px 12px;color:#6b7280;font-size:11px;transition:all .15s}
.qbtn:hover{border-color:#f97316;color:#f97316}
a{color:#d1d5db;text-decoration:none}
a:hover{color:#f97316}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;color:#4b5563;font-size:10px;font-weight:700;background:#0f172a}
td{padding:9px 12px;border-top:1px solid #1e2a3a;font-size:12px}
</style>
</head>
<body>
<div style="max-width:1080px;margin:0 auto;padding:16px">

<!-- HEADER -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 0;border-bottom:1px solid #1e2a3a">
  <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff">К</div>
  <span style="font-weight:900;font-size:20px">Kaspi<span style="color:#f97316">Analyst</span></span>
  <span class="pill" style="background:#10b98118;color:#10b981;border:1px solid #10b98130;font-size:9px">РЕАЛЬНЫЕ ДАННЫЕ</span>
</div>

<!-- SEARCH -->
<h1 style="font-weight:900;font-size:22px;margin-bottom:6px">Анализ ниш <span style="color:#f97316">Kaspi.kz</span></h1>
<p style="color:#4b5563;margin-bottom:16px;font-size:13px">Введите товар → реальные данные с Kaspi + AI анализ ниши, цен, маржи</p>

<div style="display:flex;gap:10px;margin-bottom:10px">
  <input id="q" placeholder="Например: термос, bluetooth наушники, детские игрушки..." onkeydown="if(event.key==='Enter')run()"/>
  <button id="btn" onclick="run()" style="height:44px;padding:0 24px;background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;border-radius:10px;white-space:nowrap;box-shadow:0 4px 16px #f9731640">Анализировать →</button>
</div>

<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px">
  <span style="color:#374151;font-size:11px;padding-top:3px">Быстрый старт:</span>
  <button class="qbtn" onclick="setQ('Термос')">Термос</button>
  <button class="qbtn" onclick="setQ('Bluetooth наушники')">Bluetooth наушники</button>
  <button class="qbtn" onclick="setQ('Чехол iPhone')">Чехол iPhone</button>
  <button class="qbtn" onclick="setQ('Фитнес резинки')">Фитнес резинки</button>
  <button class="qbtn" onclick="setQ('LED лампа')">LED лампа</button>
  <button class="qbtn" onclick="setQ('Power bank')">Power bank</button>
  <button class="qbtn" onclick="setQ('Маска для лица')">Маска для лица</button>
</div>

<!-- LOADING -->
<div id="loading" style="display:none;text-align:center;padding:50px 20px" class="card">
  <div style="font-size:36px;margin-bottom:12px;animation:pulse 1.4s ease infinite">🤖</div>
  <div id="lstep" style="color:#f97316;font-weight:800;font-size:15px;margin-bottom:6px"></div>
  <div style="color:#374151;font-size:12px">Получаем реальные данные с Kaspi.kz → AI анализирует</div>
</div>

<!-- ERROR -->
<div id="err" style="display:none" class="card">
  <div style="color:#ef4444;font-weight:700;margin-bottom:6px">⚠️ Ошибка</div>
  <div id="errmsg" style="color:#6b7280;font-size:13px;margin-bottom:10px"></div>
  <button onclick="run()" style="padding:8px 16px;background:#f97316;color:#fff;border-radius:8px">🔄 Попробовать снова</button>
</div>

<!-- RESULT -->
<div id="result" style="display:none"></div>

<!-- EMPTY -->
<div id="empty" style="text-align:center;padding:60px 20px;color:#1e2a3a">
  <div style="font-size:52px;margin-bottom:12px;filter:grayscale(1) opacity(.3)">📦</div>
  <div style="font-size:15px;font-weight:700;color:#374151">Введите товар для анализа</div>
  <div style="font-size:12px;margin-top:6px">Данные берутся напрямую с Kaspi.kz в реальном времени</div>
</div>

</div>

<script>
const API = 'https://kaspi-analyst-backend.onrender.com';
const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';
let D = null;

function setQ(v){document.getElementById('q').value=v;run();}
function fmt(n){return Number(n).toLocaleString('ru-KZ')}

function show(id){
  ['loading','err','result','empty'].forEach(x=>{
    document.getElementById(x).style.display = x===id ? 'block' : 'none';
  });
}

async function run() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = '⏳ Анализируем...';
    show('loading');

    try {
        // 1. Делаем ОДИН запрос к вашему бэкенду на Render
        const response = await fetch('https://kaspi-analyst-backend.onrender.com/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q })
        });

        if (!response.ok) throw new Error('Сервер Render не отвечает (код ' + response.status + ')');

        const data = await response.json();

        // 2. Проверяем, пришел ли ответ от AI
        if (data.ai && data.ai.error) {
             throw new Error('AI временно недоступен: ' + data.ai.error);
        }

        // 3. Сохраняем данные для отрисовки графиков
        // Мы берем данные, которые бэкенд уже собрал для нас
        D = {
            ai: data.ai,
            stats: data.stats,
            competitors: data.competitors,
            query: q,
            fromCache: data.fromCache
        };

        // 4. Отрисовываем результат
        renderResult('niche');

    } catch (e) {
        console.error(e);
        document.getElementById('errmsg').textContent = 'Ошибка: ' + e.message;
        show('err');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Анализировать →';
    }
}
function renderResult(tabId){
  // 1. Добавляем защиту: если ai или competitors не пришли, создаем пустые объекты/массивы
  const ai = D.ai || {};
  const competitors = D.competitors || [];
  const stats = D.stats || {};
  
  // 2. Защита для вердикта (чтобы не было ошибки с цветом)
  const verdict = ai.verdict || 'НЕТ ДАННЫХ';
  const vc = verdict === 'ВОЙТИ' ? '#10b981' : verdict === 'ОСТОРОЖНО' ? '#f59e0b' : '#ef4444';

  // Вспомогательная функция для безопасного маппинга списков
  // Используйте её ниже в коде вместо прямых .map()
  const safeList = (list) => Array.isArray(list) ? list : [];

  const gaugeHTML = (v,l,c)=>{
    // Если значения нет, ставим 0
    const val = v || 0;
    const r=34,cx=40,cy=40,circ=2*Math.PI*r,dash=(Math.max(0,Math.min(100,val))/100)*circ;
    return `<div style="text-align:center">
      <svg width="80" height="80">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2030" stroke-width="6"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="6"
          stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ*.25}" stroke-linecap="round"/>
        <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="${c}" font-size="14" font-weight="900" font-family="monospace">${val}</text>
      </svg>
      <div style="font-size:10px;color:#6b7280;font-weight:700">${l}</div>
    </div>`;
  };

  const tabs = ['niche','prices','rivals','margin'];
  const tabLabels = {'niche':'🎯 Ниша','prices':'📈 Цены','rivals':'🏆 Конкуренты','margin':'💰 Маржа'};

  let tabContent = '';
  if(tabId==='niche'){
    tabContent = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card"><div style="color:#10b981;font-weight:800;font-size:13px;margin-bottom:12px">🏔️ Свободные сегменты</div>
        ${ai.freeSegments.map((s,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">
          <div style="min-width:20px;height:20px;border-radius:5px;background:#10b98120;display:flex;align-items:center;justify-content:center;font-size:10px;color:#10b981;font-weight:800">${i+1}</div>
          <span style="color:#d1d5db;font-size:12px;line-height:1.5">${s}</span></div>`).join('')}</div>
      <div class="card"><div style="color:#6366f1;font-weight:800;font-size:13px;margin-bottom:12px">✅ Возможности</div>
        ${ai.topOpportunities.map(o=>`<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:#6366f1;font-weight:800">→</span><span style="color:#d1d5db;font-size:12px;line-height:1.5">${o}</span></div>`).join('')}</div>
      <div class="card"><div style="color:#ef4444;font-weight:800;font-size:13px;margin-bottom:12px">⚠️ Риски</div>
        ${ai.topRisks.map(r=>`<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:#ef4444">!</span><span style="color:#d1d5db;font-size:12px;line-height:1.5">${r}</span></div>`).join('')}</div>
      <div class="card"><div style="color:#f59e0b;font-weight:800;font-size:13px;margin-bottom:12px">🔑 Ключевые слова</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${ai.keywords.map(k=>`<span class="pill" style="background:#f59e0b18;border:1px solid #f59e0b40;color:#f59e0b">${k}</span>`).join('')}
        </div>
        <div style="font-size:10px;color:#4b5563;font-weight:700;margin-bottom:6px">СЕЗОННОСТЬ</div>
        <span class="pill" style="background:#6366f118;border:1px solid #6366f140;color:#6366f1">${ai.seasonality}</span>
      </div>
    </div>`;
  } else if(tabId==='prices'){
    tabContent = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card" style="grid-column:1/-1">
        <div style="color:#6366f1;font-weight:800;font-size:13px;margin-bottom:12px">📈 Динамика и тренд цен</div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
          <div>
            <div style="font-size:10px;color:#4b5563;font-weight:700;margin-bottom:6px">ТРЕНД (AI АНАЛИЗ)</div>
            <span class="pill" style="background:${ai.priceTrend==='РАСТЁТ'?'#10b98118':'#ef444418'};border:1px solid ${ai.priceTrend==='РАСТЁТ'?'#10b98140':'#ef444440'};color:${ai.priceTrend==='РАСТЁТ'?'#10b981':'#ef4444'};font-size:14px;padding:6px 16px">
              ${ai.priceTrend==='РАСТЁТ'?'↑':'↓'} ${ai.priceTrend}
            </span>
            <div style="color:#6b7280;font-size:12px;margin-top:8px;max-width:300px;line-height:1.5">${ai.priceTrendText}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px;color:#4b5563;font-weight:700;margin-bottom:4px">СРЕДНЯЯ ЦЕНА НА KASPI</div>
            <div style="font-size:32px;font-weight:900;color:#10b981;font-family:monospace">${fmt(stats.avgPrice)} тг</div>
            <div style="color:#6b7280;font-size:11px">диапазон: ${fmt(stats.minPrice)} – ${fmt(stats.maxPrice)} тг</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div style="color:#f97316;font-weight:800;font-size:13px;margin-bottom:12px">💲 Реальный разброс цен</div>
        ${Object.entries(stats.priceRanges).map(([l,cnt])=>{
          const pct=Math.round((cnt/Math.max(stats.totalFound,1))*100);
          return `<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:#9ca3af">${l} тг</span>
              <span style="font-size:11px;color:#6b7280">${cnt} прод. (${pct}%)</span>
            </div>
            <div style="height:5px;background:#1e2a3a;border-radius:4px">
              <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#f97316,#fb923c);border-radius:4px"></div>
            </div></div>`;
        }).join('')}
      </div>
      <div class="card">
        <div style="color:#10b981;font-weight:800;font-size:13px;margin-bottom:12px">🎯 Рекомендация по цене</div>
        <div style="font-size:10px;color:#4b5563;font-weight:700;margin-bottom:4px">ОПТИМАЛЬНАЯ ЦЕНА ВХОДА</div>
        <div style="font-size:30px;font-weight:900;color:#10b981;font-family:monospace;margin-bottom:12px">${fmt(ai.optimalPrice)} тг</div>
        <div style="font-size:10px;color:#4b5563;font-weight:700;margin-bottom:6px">ТАКТИКА ЦЕНООБРАЗОВАНИЯ</div>
        <p style="color:#d1d5db;font-size:12px;line-height:1.6;margin:0">${ai.pricingTip}</p>
      </div>
    </div>`;
  } else if(tabId==='rivals'){
    tabContent = `<div style="display:flex;flex-direction:column;gap:12px">
      <div style="color:#4b5563;font-size:11px">✅ Реальные продавцы с Kaspi.kz — кликните на товар чтобы открыть</div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="overflow-x:auto">
          <table>
            <thead><tr>${['#','Товар','Магазин','Цена','Рейтинг','Отзывы','Наличие'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
            <tbody>${competitors.map((c,i)=>`<tr>
              <td style="color:#374151">${i+1}</td>
              <td style="max-width:200px"><a href="${c.url}" target="_blank" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${c.name}</a></td>
              <td><span style="background:#1e2a3a;border-radius:5px;padding:2px 7px;font-size:10px;color:#6b7280">${c.seller}</span></td>
              <td style="color:#f59e0b;font-weight:700;font-family:monospace;white-space:nowrap">${fmt(c.price)} тг</td>
              <td style="color:#fbbf24">★ ${c.rating}</td>
              <td style="color:#9ca3af">${fmt(c.reviews)}</td>
              <td style="color:${c.inStock?'#10b981':'#ef4444'};font-weight:700">${c.inStock?'Есть':'Нет'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div style="color:#f59e0b;font-weight:800;font-size:13px;margin-bottom:12px">⭐ Стратегия по отзывам</div>
        <div style="display:flex;gap:24px;margin-bottom:12px">
          <div style="text-align:center"><div style="font-size:9px;color:#4b5563;font-weight:700">СЛАБЫХ</div><div style="font-size:28px;font-weight:900;color:#10b981">${stats.weakSellers}</div></div>
          <div style="text-align:center"><div style="font-size:9px;color:#4b5563;font-weight:700">СИЛЬНЫХ</div><div style="font-size:28px;font-weight:900;color:#ef4444">${stats.strongSellers}</div></div>
          <div style="text-align:center"><div style="font-size:9px;color:#4b5563;font-weight:700">СРЕДНЕЕ</div><div style="font-size:28px;font-weight:900;color:#f59e0b">${stats.avgReviews}</div></div>
        </div>
        <p style="color:#d1d5db;font-size:12px;line-height:1.6;margin:0">${ai.reviewTip}</p>
      </div>
    </div>`;
  } else {
    const p1 = Math.round(ai.optimalPrice*ai.marginPct/100);
    tabContent = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="card">
        <div style="color:#f97316;font-weight:800;font-size:13px;margin-bottom:12px">💰 Финансовая модель</div>
        ${[['Цена продажи',`${fmt(ai.optimalPrice)} тг`,'#e2e8f0'],
           ['Комиссия Kaspi (~15%)',`−${fmt(Math.round(ai.optimalPrice*.15))} тг`,'#ef4444'],
           ['Себестоимость',`−${fmt(Math.round(ai.optimalPrice*(1-ai.marginPct/100)*.85))} тг`,'#ef4444'],
           ['Чистая прибыль/шт',`${fmt(p1)} тг`,'#10b981'],
           ['Маржинальность',`${ai.marginPct}%`,'#f59e0b']
          ].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e2a3a">
            <span style="color:#6b7280;font-size:12px">${l}</span>
            <span style="color:${c};font-weight:800;font-family:monospace">${v}</span></div>`).join('')}
      </div>
      <div class="card">
        <div style="color:#6366f1;font-weight:800;font-size:13px;margin-bottom:12px">📊 Точка окупаемости</div>
        <div style="text-align:center;padding:10px 0 16px">
          <div style="font-size:10px;color:#4b5563;font-weight:700;margin-bottom:4px">НУЖНО ПРОДАТЬ</div>
          <div style="font-size:52px;font-weight:900;color:#6366f1;font-family:monospace;line-height:1">${ai.breakEvenUnits}</div>
          <div style="color:#6b7280;font-size:12px;margin-top:4px">единиц</div>
        </div>
        <div style="background:#0f172a;border-radius:8px;padding:12px">
          ${[[10,'#9ca3af'],[50,'#f59e0b'],[100,'#10b981']].map(([q,c])=>`
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="color:#4b5563;font-size:11px">При ${q} шт/мес</span>
              <span style="color:${c};font-size:11px;font-family:monospace">${fmt(p1*q)} тг</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="card" style="grid-column:1/-1">
        <div style="color:#f97316;font-weight:800;font-size:13px;margin-bottom:10px">🚀 Стратегия входа в нишу</div>
        <p style="color:#d1d5db;font-size:13px;line-height:1.7;margin:0">${ai.entryStrategy}</p>
      </div>
    </div>`;
  }

  document.getElementById('result').innerHTML = `
    <div style="animation:fadeUp .4s ease">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:11px">
        <span style="color:${fromCache?'#6366f1':'#10b981'};font-weight:700">${fromCache?'⚡ Из кэша':'🟢 Свежие данные Kaspi.kz'}</span>
        <span style="color:#374151">|</span>
        <span style="color:#4b5563">Товаров: <b style="color:#9ca3af">${stats.totalFound}</b></span>
        <span style="color:#374151">|</span>
        <span style="color:#4b5563">Отзывов: <b style="color:#9ca3af">${fmt(stats.totalReviews)}</b></span>
        <button onclick="run()" style="margin-left:auto;background:none;border:1px solid #1e2a3a;border-radius:7px;padding:3px 10px;color:#6b7280;font-size:11px">🔄 Обновить</button>
      </div>

      <div style="background:linear-gradient(135deg,${vc}12,${vc}06);border:1px solid ${vc}35;border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div>
          <div style="font-size:10px;color:#4b5563;margin-bottom:4px;font-weight:700;letter-spacing:1px">ВЕРДИКТ AI | РЕАЛЬНЫЕ ДАННЫЕ KASPI.KZ</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="background:${vc};color:#000;font-weight:900;font-size:14px;padding:5px 16px;border-radius:30px">${ai.verdict}</span>
            <span style="color:#d1d5db;font-size:12px;max-width:320px">${ai.verdictText}</span>
          </div>
        </div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          ${[['Цена входа',`${fmt(ai.optimalPrice)} тг`,'#10b981'],['Маржа',`${ai.marginPct}%`,'#f59e0b'],['Прибыль/мес',`${fmt(ai.monthlyProfit)} тг`,'#6366f1'],['Окупаемость',`${ai.breakEvenUnits} шт`,'#f97316']].map(([l,v,c])=>`
            <div style="text-align:center">
              <div style="font-size:9px;color:#4b5563;font-weight:700;margin-bottom:2px">${l}</div>
              <div style="font-size:18px;font-weight:900;color:${c};font-family:monospace">${v}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="card" style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        ${gaugeHTML(ai.nicheScore,'Свобода ниши','#10b981')}
        ${gaugeHTML(Math.max(0,100-ai.competitionScore),'Лёгкость входа','#6366f1')}
        ${gaugeHTML(ai.demandScore,'Спрос','#f59e0b')}
        ${gaugeHTML(ai.marginScore,'Маржинальность','#f97316')}
      </div>

      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        ${tabs.map(t=>`<button class="tab ${t===tabId?'on':''}" onclick="switchTab('${t}')">${tabLabels[t]}</button>`).join('')}
      </div>

      <div id="tabcontent">${tabContent}</div>
    </div>`;

  show('result');
}

function switchTab(id){
  if(!D) return;
  renderResult(id);
  setTimeout(()=>{
    document.querySelectorAll('.tab').forEach(b=>{
      const map={'niche':'Ниша','prices':'Цены','rivals':'Конкуренты','margin':'Маржа'};
      b.classList.toggle('on', b.textContent.includes(map[id]));
    });
  },10);
}
</script>
</body>
</html>
