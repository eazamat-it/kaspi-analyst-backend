<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaspiAnalyst — Анализ ниш Kaspi.kz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060b14;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
input,select{background:#0f172a;border:1px solid #1e2a3a;border-radius:10px;color:#e2e8f0;font-size:14px;padding:0 16px;height:44px;outline:none;width:100%}
input:focus{border-color:#f97316}
button{cursor:pointer;border:none;font-weight:700;font-size:13px;font-family:'Segoe UI',sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:linear-gradient(145deg,#111827,#0f172a);border:1px solid #1e2a3a;border-radius:14px;padding:18px}
.pill{border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;display:inline-block}
.tab{border-radius:9px;padding:7px 16px;font-weight:700;font-size:12px;transition:all .15s;border:1px solid #1e2a3a;background:#0f172a;color:#6b7280;margin-right:5px}
.tab.on{background:#f97316;border-color:#f97316;color:#fff}
.qbtn{background:#0f172a;border:1px solid #1e2a3a;border-radius:20px;padding:4px 12px;color:#6b7280;font-size:11px;transition:all .15s;margin-bottom:5px}
.qbtn:hover{border-color:#f97316;color:#f97316}
a{color:#d1d5db;text-decoration:none}
a:hover{color:#f97316}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;color:#4b5563;font-size:10px;font-weight:700;background:#0f172a}
td{padding:9px 12px;border-top:1px solid #1e2a3a;font-size:12px}
</style>
</head>
<body>
<div style="max-width:1080px;margin:0 auto;padding:16px">

<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 0;border-bottom:1px solid #1e2a3a">
  <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff">К</div>
  <span style="font-weight:900;font-size:20px">Kaspi<span style="color:#f97316">Analyst</span></span>
  <span class="pill" style="background:#10b98118;color:#10b981;border:1px solid #10b98130;font-size:9px">РЕАЛЬНЫЕ ДАННЫЕ</span>
</div>

<h1 style="font-weight:900;font-size:22px;margin-bottom:6px">Анализ ниш <span style="color:#f97316">Kaspi.kz</span></h1>
<p style="color:#4b5563;margin-bottom:16px;font-size:13px">Введите товар → реальные данные с Kaspi + AI анализ ниши, цен, маржи</p>

<div style="display:flex;gap:10px;margin-bottom:10px">
  <input id="q" placeholder="Например: термос, bluetooth наушники, детские игрушки..." onkeydown="if(event.key==='Enter')run()"/>
  <button id="btn" onclick="run()" style="height:44px;padding:0 24px;background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;border-radius:10px;white-space:nowrap;box-shadow:0 4px 16px #f9731640">Анализировать →</button>
</div>

<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px">
  <span style="color:#374151;font-size:11px;padding-top:3px">Быстрый старт:</span>
  <button class="qbtn" onclick="setQ('Термос')">Термос</button>
  <button class="qbtn" onclick="setQ('Bluetooth наушники')">Bluetooth наушники</button>
  <button class="qbtn" onclick="setQ('Чехол iPhone')">Чехол iPhone</button>
  <button class="qbtn" onclick="setQ('Фитнес резинки')">Фитнес резинки</button>
  <button class="qbtn" onclick="setQ('LED лампа')">LED лампа</button>
  <button class="qbtn" onclick="setQ('Power bank')">Power bank</button>
  <button class="qbtn" onclick="setQ('Маска для лица')">Маска для лица</button>
</div>

<div id="loading" style="display:none;text-align:center;padding:50px 20px" class="card">
  <div style="font-size:36px;margin-bottom:12px;animation:pulse 1.4s ease infinite">🤖</div>
  <div id="lstep" style="color:#f97316;font-weight:800;font-size:15px;margin-bottom:6px">Обработка...</div>
  <div style="color:#374151;font-size:12px">Получаем реальные данные с Kaspi.kz → AI анализирует</div>
</div>

<div id="err" style="display:none" class="card">
  <div style="color:#ef4444;font-weight:700;margin-bottom:6px">⚠️ Ошибка</div>
  <div id="errmsg" style="color:#6b7280;font-size:13px;margin-bottom:10px"></div>
  <button onclick="run()" style="padding:8px 16px;background:#f97316;color:#fff;border-radius:8px">🔄 Попробовать снова</button>
</div>

<div id="result" style="display:none"></div>

<div id="empty" style="text-align:center;padding:60px 20px;color:#1e2a3a">
  <div style="font-size:52px;margin-bottom:12px;filter:grayscale(1) opacity(.3)">📦</div>
  <div style="font-size:15px;font-weight:700;color:#374151">Введите товар для анализа</div>
  <div style="font-size:12px;margin-top:6px">Данные берутся напрямую с Kaspi.kz в реальном времени</div>
</div>

</div>

<script>
const API = 'https://kaspi-analyst-backend.onrender.com';
let D = {}; 

function setQ(v) {
    document.getElementById('q').value = v;
    run();
}

function fmt(n) {
    return n ? Number(n).toLocaleString('ru-KZ') : '0';
}

function show(id) {
    ['loading', 'err', 'result', 'empty'].forEach(x => {
        const el = document.getElementById(x);
        if (el) el.style.display = (x === id ? 'block' : 'none');
    });
}

async function run() {
    const qInput = document.getElementById('q');
    const q = qInput.value.trim();
    if (!q) return;

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = '⏳ Анализируем...';
    show('loading');

    try {
        const response = await fetch(`${API}/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q })
        });

        if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);
        const data = await response.json();

        if (data.ai && data.ai.error) throw new Error(data.ai.error);

        D = {
            ai: data.ai || {},
            stats: data.stats || {},
            competitors: data.competitors || [],
            query: q,
            fromCache: data.fromCache || false
        };

        renderResult('niche');
        show('result');
    } catch (e) {
        document.getElementById('errmsg').textContent = e.message;
        show('err');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Анализировать →';
    }
}

function renderResult(tabId) {
    // Добавляем проверку на существование D и вложенных объектов
    if (!D || !D.ai) {
        console.error("Данные не загружены или имеют неверный формат", D);
        return;
    }

    const ai = D.ai;
    const stats = D.stats || {};
    const competitors = D.competitors || [];
    const query = D.query || '';
    const fromCache = D.fromCache || false;

    // Защита от undefined: если данных нет, ставим 0 или "Нет данных"
    const verdict = ai.verdict || 'Н/Д';
    const verdictText = ai.verdictText || 'Описание отсутствует';
    const nicheScore = ai.nicheScore || ai.niche_score || 0;
    const demandScore = ai.demandScore || ai.demand_score || 0;
    const marginScore = ai.marginScore || ai.margin_score || 0;
    
    const vc = verdict === 'ВОЙТИ' ? '#10b981' : verdict === 'ОСТОРОЖНО' ? '#f59e0b' : '#ef4444';
    
    const gaugeHTML = (v, l, c) => {
        const val = v || 0;
        const r = 34, circ = 2 * Math.PI * r, dash = (Math.max(0, Math.min(100, val)) / 100) * circ;
        return `<div style="text-align:center">
            <svg width="80" height="80">
                <circle cx="40" cy="40" r="${r}" fill="none" stroke="#1e2030" stroke-width="6"/>
                <circle cx="40" cy="40" r="${r}" fill="none" stroke="${c}" stroke-width="6"
                    stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${circ * .25}" stroke-linecap="round"/>
                <text x="40" y="45" text-anchor="middle" fill="${c}" font-size="14" font-weight="900">${val}</text>
            </svg>
            <div style="font-size:9px;color:#4b5563;font-weight:700;text-transform:uppercase">${l}</div>
        </div>`;
    };

    let tabContent = '';
    if(tabId === 'niche') {
        tabContent = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="card"><div style="color:#10b981;font-weight:800;font-size:12px;margin-bottom:10px">🏔️ Свободные сегменты</div>
                ${(ai.freeSegments || ai.free_segments || ['Нет данных']).map(s => `<div style="font-size:12px;color:#d1d5db;margin-bottom:5px">· ${s}</div>`).join('')}</div>
                <div class="card"><div style="color:#6366f1;font-weight:800;font-size:12px;margin-bottom:10px">✅ Возможности</div>
                ${(ai.topOpportunities || ai.top_opportunities || ['Нет данных']).map(o => `<div style="font-size:12px;color:#d1d5db;margin-bottom:5px">→ ${o}</div>`).join('')}</div>
            </div>`;
    } else if(tabId === 'prices') {
        tabContent = `<div class="card">
            <div style="color:#6366f1;font-weight:800;margin-bottom:12px">📈 Статистика цен</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div><div style="font-size:10px;color:#4b5563">СРЕДНЯЯ ЦЕНА</div><div style="font-size:24px;font-weight:900;color:#10b981">${fmt(stats.avgPrice || stats.avg_price)} тг</div></div>
                <div style="text-align:right"><div style="font-size:10px;color:#4b5563">ТРЕНД</div><div style="font-size:18px;font-weight:800;color:#f59e0b">${ai.priceTrend || ai.price_trend || 'СТАБИЛЬНО'}</div></div>
            </div>
        </div>`;
    } else if(tabId === 'rivals') {
        tabContent = `<div class="card" style="padding:0;overflow:hidden">
            <table>
                <thead><tr><th>Товар</th><th>Магазин</th><th>Цена</th><th>Отзывы</th></tr></thead>
                <tbody>${competitors.length > 0 ? competitors.slice(0,10).map(c => `<tr>
                    <td style="max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><a href="${c.url}" target="_blank">${c.name}</a></td>
                    <td>${c.seller || 'Kaspi Магазин'}</td>
                    <td style="color:#f59e0b;font-weight:700">${fmt(c.price)}</td>
                    <td>${fmt(c.reviews)}</td>
                </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;padding:20px">Конкуренты не найдены</td></tr>'}</tbody>
            </table>
        </div>`;
    } else {
        const optPrice = ai.optimalPrice || ai.optimal_price || 0;
        const marginPct = ai.marginPct || ai.margin_pct || 0;
        const p1 = Math.round(optPrice * marginPct / 100);
        tabContent = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="card"><div style="color:#f97316;font-weight:800;font-size:12px;margin-bottom:8px">Прибыль/шт</div><div style="font-size:24px;font-weight:900;color:#10b981">${fmt(p1)} тг</div></div>
            <div class="card"><div style="color:#6366f1;font-weight:800;font-size:12px;margin-bottom:8px">Окупаемость</div><div style="font-size:24px;font-weight:900;color:#f97316">${ai.breakEvenUnits || ai.break_even_units || 0} шт</div></div>
        </div>`;
    }

    const tabs = ['niche', 'prices', 'rivals', 'margin'];
    const labels = {'niche':'Ниша', 'prices':'Цены', 'rivals':'Конкуренты', 'margin':'Маржа'};

    document.getElementById('result').innerHTML = `
        <div style="animation:fadeUp .4s ease">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:11px">
                <span style="color:${fromCache?'#6366f1':'#10b981'};font-weight:700">${fromCache?'⚡ Архив':'🟢 Прямой эфир'}</span>
                <span style="color:#4b5563">| Найдено: ${stats.totalFound || 0} | Запрос: ${query}</span>
            </div>

            <div class="card" style="border-left:4px solid ${vc};margin-bottom:16px">
                <div style="font-size:10px;color:#4b5563;font-weight:800;margin-bottom:4px">ВЕРДИКТ AI</div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
                    <span style="background:${vc};color:#000;font-weight:900;padding:4px 12px;border-radius:20px">${verdict}</span>
                    <span style="font-size:12px;color:#d1d5db">${verdictText}</span>
                </div>
                <div style="display:flex;justify-content:space-around;padding-top:15px;border-top:1px solid #1e2a3a">
                    ${gaugeHTML(nicheScore,'Ниша','#6366f1')}
                    ${gaugeHTML(demandScore,'Спрос','#10b981')}
                    ${gaugeHTML(marginScore,'Маржа','#f97316')}
                </div>
            </div>

            <div style="display:flex;margin-bottom:14px">
                ${tabs.map(t => `<button class="tab ${t===tabId?'on':''}" onclick="renderResult('${t}')">${labels[t]}</button>`).join('')}
            </div>
            <div id="tabcontent">${tabContent}</div>
        </div>`;
}

    const tabs = ['niche', 'prices', 'rivals', 'margin'];
    const labels = {'niche':'Ниша', 'prices':'Цены', 'rivals':'Конкуренты', 'margin':'Маржа'};

    document.getElementById('result').innerHTML = `
        <div style="animation:fadeUp .4s ease">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:11px">
                <span style="color:${fromCache?'#6366f1':'#10b981'};font-weight:700">${fromCache?'⚡ Архив':'🟢 Прямой эфир'}</span>
                <span style="color:#4b5563">| Найдено: ${stats.totalFound} | Запрос: ${query}</span>
            </div>

            <div class="card" style="border-left:4px solid ${vc};margin-bottom:16px">
                <div style="font-size:10px;color:#4b5563;font-weight:800;margin-bottom:4px">ВЕРДИКТ AI</div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
                    <span style="background:${vc};color:#000;font-weight:900;padding:4px 12px;border-radius:20px">${ai.verdict}</span>
                    <span style="font-size:12px;color:#d1d5db">${ai.verdictText}</span>
                </div>
                <div style="display:flex;justify-content:space-around;padding-top:15px;border-top:1px solid #1e2a3a">
                    ${gaugeHTML(ai.nicheScore,'Ниша','#6366f1')}
                    ${gaugeHTML(ai.demandScore,'Спрос','#10b981')}
                    ${gaugeHTML(ai.marginScore,'Маржа','#f97316')}
                </div>
            </div>

            <div style="display:flex;margin-bottom:14px">
                ${tabs.map(t => `<button class="tab ${t===tabId?'on':''}" onclick="renderResult('${t}')">${labels[t]}</button>`).join('')}
            </div>
            <div id="tabcontent">${tabContent}</div>
        </div>`;
}
</script>
</body>
</html>
