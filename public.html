<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - MarketAnalyst.kz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e5e7eb; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #1a2332; border: 1px solid #2d3e4f; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .card h2 { color: #f97316; margin-bottom: 16px; }
        .upload-area { border: 2px dashed #f97316; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; }
        .upload-area:hover { background: rgba(249, 115, 22, 0.1); }
        .btn { background: #f97316; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #ea580c; }
        .file-input { display: none; }
        .item { background: #0f1419; padding: 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .ok { color: #10b981; }
        .low { color: #f59e0b; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>📊 MarketAnalyst.kz - Загрузка товаров</h2>
            
            <button class="btn" onclick="downloadTemplate()" style="margin-bottom: 20px;">📥 Скачать шаблон Excel</button>
            
            <div class="upload-area" onclick="document.getElementById('excelFile').click()">
                <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
                <div style="font-size: 18px; font-weight: 600; color: #f97316;">Перетащите Excel сюда или нажмите</div>
                <input type="file" id="excelFile" class="file-input" accept=".xlsx,.xls" onchange="loadExcel(event)">
            </div>
            
            <div id="results" style="margin-top: 20px;"></div>
        </div>
    </div>
    
    <script>
        function downloadTemplate() {
            const data = [
                ['Название товара', 'Закупочная цена', 'ВАША цена', 'Минимальная цена', 'Доставка', 'Комиссия %', 'Kaspi Жұма'],
                ['iPhone 15 Pro', 750000, 900000, 870000, 700, 11, 'ДА'],
                ['Samsung S24', 680000, 820000, 750000, 700, 11, 'НЕТ'],
                ['Corsair Mouse', 25000, 45000, 40000, 700, 15, 'НЕТ']
            ];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Товары');
            XLSX.writeFile(wb, 'MarketAnalyst_Template.xlsx');
        }
        
        function loadExcel(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(worksheet);
                
                processAndSave(rows);
            };
            reader.readAsArrayBuffer(file);
        }
        
        function processAndSave(rows) {
            let html = '<h3 style="color: #f97316; margin-bottom: 12px;">✅ Товары загружены:</h3>';
            
            rows.forEach(row => {
                const cost = parseInt(row['Закупочная цена']) || 0;
                const price = parseInt(row['ВАША цена']) || 0;
                const delivery = parseInt(row['Доставка']) || 700;
                const commission = parseFloat(row['Комиссия %']) || 15;
                
                const profit = price - Math.round(price * (commission / 100)) - Math.round(price * 0.03) - delivery - cost;
                const margin = ((profit / price) * 100).toFixed(1);
                
                let status = profit < 0 ? '<span class="error">❌ УБЫТОК</span>' : 
                             margin < 15 ? '<span class="low">⚠️ НИЗКО</span>' : 
                             '<span class="ok">✅ OK</span>';
                
                html += `<div class="item">
                    <div>
                        <div style="font-weight: 600;">${row['Название товара']}</div>
                        <div style="font-size: 12px; color: #9ca3af;">Прибыль: ${profit.toLocaleString()}₸ | Маржа: ${margin}%</div>
                    </div>
                    <div>${status}</div>
                </div>`;
            });
            
            html += `<button class="btn" style="width: 100%; margin-top: 16px;" onclick="saveToServer(${JSON.stringify(rows).replace(/"/g, '&quot;')})">💾 Сохранить товары</button>`;
            
            document.getElementById('results').innerHTML = html;
        }
        
        function saveToServer(products) {
            fetch('https://api.marketanalyst.kz/api/seller/save-products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    seller_id: 'user_' + Date.now(),
                    products: products
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alert(`✅ Сохранено товаров: ${data.count}`);
                } else {
                    alert('❌ Ошибка: ' + data.message);
                }
            })
            .catch(err => alert('⚠️ Ошибка подключения'));
        }
    </script>
</body>
</html>
