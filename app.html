<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketAnalyst.kz - Анализ ниш Kазахстансого рынка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #060b14 0%, #0f1419 100%); color: #e5e7eb; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 20px 0; border-bottom: 1px solid #1e2a3a; }
        .header h1 { font-size: 28px; color: #f97316; }
        .header a { background: #f97316; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; }
        .search-box { background: #0f1419; border: 1px solid #1e2a3a; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 12px 16px; background: #1e2a3a; border: 1px solid #2d3e4f; border-radius: 6px; color: #e5e7eb; font-size: 16px; }
        .search-input:focus { outline: none; border-color: #f97316; }
        .result-card { background: #0f1419; border: 1px solid #1e2a3a; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .verdict { background: linear-gradient(135deg, rgba(249, 115, 22, 0.1) 0%, rgba(234, 88, 12, 0.05) 100%); border-left: 4px solid #f97316; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .verdict-title { font-size: 20px; font-weight: 700; color: #f97316; margin-bottom: 12px; }
        .verdict-text { color: #d1d5db; line-height: 1.6; font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-box { background: #1e2a3a; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-label { color: #9ca3af; font-size: 12px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; color: #f97316; }
        .scores { background: #1e2a3a; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .score-item { margin-bottom: 16px; }
        .score-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .score-name { font-weight: 600; }
        .score-value { color: #f97316; font-weight: 700; }
        .progress-bar { width: 100%; height: 8px; background: #0f1419; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981 0%, #f97316 50%, #ef4444 100%); border-radius: 4px; }
        .advice { background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; padding: 16px; border-radius: 8px; margin-top: 20px; color: #a7f3d0; font-size: 13px; line-height: 1.6; }
        .danger { background: rgba(239, 68, 68, 0.1); border-left-color: #ef4444; color: #fca5a5; }
        .warning { background: rgba(245, 158, 11, 0.1); border-left-color: #f59e0b; color: #fcd34d; }
        .loading { text-align: center; padding: 40px; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #1e2a3a; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 MarketAnalyst.kz</h1>
            <a href="seller.html">👤 Личный кабинет →</a>
        </div>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск товара на Kaspi: iPhone 15, ноутбук, кондиционер..." onkeypress="if(event.key==='Enter') searchProduct()">
        </div>
        
        <div id="results"></div>
    </div>
    
    <script>
        function searchProduct() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Введи название товара');
                return;
            }
            
            document.getElementById('results').innerHTML = '<div class="loading"><div class="spinner"></div><p>Анализирую товар...</p></div>';
            
            fetch('https://api.marketanalyst.kz/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: query})
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'error') {
                    document.getElementById('results').innerHTML = `<div class="result-card"><div class="verdict danger"><div class="verdict-title">❌ Товар не найден</div><div class="verdict-text">${data.message}</div></div></div>`;
                    return;
                }
                displayResults(data);
            })
            .catch(err => {
                document.getElementById('results').innerHTML = `<div class="result-card"><div class="verdict danger"><div class="verdict-title">⚠️ Ошибка</div><div class="verdict-text">${err.message}</div></div></div>`;
            });
        }
        
        function calculateScores(data) {
            const reviews = data.reviews || 0;
            const sellers = data.sellers_count || 1;
            const minPrice = data.min_price || 0;
            const maxPrice = data.max_price || minPrice;
            
            let demand = reviews === 0 ? 2 : Math.min(100, (reviews / 100) * 100);
            let competition = sellers <= 5 ? 30 : sellers <= 15 ? 70 : 95;
            let margin = Math.max(0, Math.min(100, 60 - (competition * 0.3)));
            let attractiveness = reviews === 0 && sellers > 15 ? 10 : Math.round((demand + (100 - competition) + margin) / 3);
            
            return { demand: Math.round(demand), margin: Math.round(margin), competition: Math.round(competition), attractiveness: Math.round(attractiveness) };
        }
        
        function displayResults(data) {
            const scores = calculateScores(data);
            const avgPrice = Math.round((data.min_price + data.max_price) / 2);
            
            let html = `<div class="result-card">
                <div class="verdict">
                    <div class="verdict-title">${scores.attractiveness >= 70 ? '✅ ОТЛИЧНАЯ' : scores.attractiveness >= 50 ? '✅ ХОРОШАЯ' : scores.attractiveness >= 30 ? '⚠️ РИСКОВАННАЯ' : '🚫 КРИТИЧЕСКИЙ РИСК'}</div>
                    <div class="verdict-text">Товар: <strong>${data.product_name}</strong> | Продавцов: <strong>${data.sellers_count}</strong> | Отзывов: <strong>${data.reviews}</strong> | Средняя цена: <strong>${avgPrice.toLocaleString()}₸</strong></div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-label">ТОВАРОВ</div><div class="stat-value">1</div></div>
                    <div class="stat-box"><div class="stat-label">СРЕДНЯЯ ЦЕНА</div><div class="stat-value">${avgPrice.toLocaleString()}₸</div></div>
                    <div class="stat-box"><div class="stat-label">КОНКУРЕНЦИЯ</div><div class="stat-value">${data.sellers_count}</div></div>
                    <div class="stat-box"><div class="stat-label">ОПТИМ. ЦЕНА</div><div class="stat-value">${(data.min_price - 1).toLocaleString()}₸</div></div>
                </div>
                
                <div class="scores">
                    <div class="score-item">
                        <div class="score-label"><span>Привлекательность</span><span class="score-value">${scores.attractiveness}/100</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${scores.attractiveness}%"></div></div>
                    </div>
                    <div class="score-item">
                        <div class="score-label"><span>Спрос</span><span class="score-value">${scores.demand}/100</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${scores.demand}%"></div></div>
                    </div>
                    <div class="score-item">
                        <div class="score-label"><span>Маржинальность</span><span class="score-value">${scores.margin}/100</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${scores.margin}%"></div></div>
                    </div>
                    <div class="score-item">
                        <div class="score-label"><span>Конкуренция</span><span class="score-value">${scores.competition}/100</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${scores.competition}%"></div></div>
                    </div>
                </div>
                
                ${scores.attractiveness < 30 ? `<div class="advice danger"><strong>⛔️ РЕКОМЕНДАЦИЯ:</strong> Входить опасно! На перегретую карточку навалилось много конкурентов. Создай собственную карточку с уникальным контентом.</div>` : scores.competition >= 50 ? `<div class="advice warning"><strong>⚠️ ВНИМАНИЕ:</strong> Высокая конкуренция. Потребуется агрессивная ценовая стратегия и уникальное позиционирование.</div>` : `<div class="advice"><strong>✅ СОВЕТ:</strong> Хорошая ниша для входа. Вы можете начать продажи по оптимальной цене.</div>`}
            </div>`;
            
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
