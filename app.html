<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketAnalyst.kz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0f1419; color: #e5e7eb; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .header h1 { color: #f97316; font-size: 28px; }
        .header a { background: #f97316; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; }
        .search-box { margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 12px; background: #1e2a3a; border: 1px solid #2d3e4f; border-radius: 6px; color: #e5e7eb; font-size: 16px; }
        .search-box input:focus { outline: none; border-color: #f97316; }
        .result { background: #1e2a3a; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .verdict { background: rgba(249, 115, 22, 0.1); border-left: 4px solid #f97316; padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .verdict-title { color: #f97316; font-weight: bold; margin-bottom: 8px; font-size: 18px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 15px 0; }
        .stat { background: #0f1419; padding: 12px; border-radius: 6px; text-align: center; }
        .stat-label { color: #9ca3af; font-size: 11px; }
        .stat-value { color: #f97316; font-size: 22px; font-weight: bold; }
        .scores { margin: 20px 0; }
        .score-item { margin: 10px 0; }
        .score-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .progress { height: 8px; background: #0f1419; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #f97316, #ef4444); }
        .loading { text-align: center; padding: 40px; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #1e2a3a; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 MarketAnalyst.kz</h1>
            <a href="seller.html">👤 Личный кабинет</a>
        </div>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="Поиск товара: iPhone, термос, ноутбук..." onkeypress="if(event.key==='Enter') search()">
        </div>
        
        <div id="result"></div>
    </div>
    
    <script>
        function search() {
            const q = document.getElementById('search').value.trim();
            if (!q) return alert('Введи название товара');
            
            document.getElementById('result').innerHTML = '<div class="loading"><div class="spinner"></div><p>Анализирую...</p></div>';
            
            fetch('https://api.marketanalyst.kz/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: q})
            })
            .then(r => r.json())
            .then(d => {
                if (d.status !== 'success') {
                    document.getElementById('result').innerHTML = `<div class="result"><div class="verdict"><div class="verdict-title">❌ Ошибка</div><div>${d.message}</div></div></div>`;
                    return;
                }
                
                let html = `
                    <div class="result">
                        <div class="verdict">
                            <div class="verdict-title">${d.header_verdict_title}</div>
                            <div>${d.ai_analysis_text}</div>
                        </div>
                        
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-label">ТОВАРОВ</div>
                                <div class="stat-value">1</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">СРЕДНЯЯ ЦЕНА</div>
                                <div class="stat-value">${d.cards_data.average_price.toLocaleString()}₸</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">КОНКУРЕНЦИЯ</div>
                                <div class="stat-value">${d.sellers_count}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">ОПТИМ. ЦЕНА</div>
                                <div class="stat-value">${d.cards_data.optimal_entry_price.toLocaleString()}₸</div>
                            </div>
                        </div>
                        
                        <div class="scores">
                            <div class="score-item">
                                <div class="score-label"><span>Привлекательность</span><span style="color:#f97316">${d.scores.niche_attractiveness}/100</span></div>
                                <div class="progress"><div class="progress-fill" style="width:${d.scores.niche_attractiveness}%"></div></div>
                            </div>
                            <div class="score-item">
                                <div class="score-label"><span>Спрос</span><span style="color:#f97316">${d.scores.demand}/100</span></div>
                                <div class="progress"><div class="progress-fill" style="width:${d.scores.demand}%"></div></div>
                            </div>
                            <div class="score-item">
                                <div class="score-label"><span>Маржинальность</span><span style="color:#f97316">${d.scores.margin}/100</span></div>
                                <div class="progress"><div class="progress-fill" style="width:${d.scores.margin}%"></div></div>
                            </div>
                            <div class="score-item">
                                <div class="score-label"><span>Конкуренция</span><span style="color:#f97316">${d.scores.competition_level}/100</span></div>
                                <div class="progress"><div class="progress-fill" style="width:${d.scores.competition_level}%"></div></div>
                            </div>
                        </div>
                        
                        <div style="margin-top:15px; padding:12px; background:rgba(16,185,129,0.1); border-left:4px solid #10b981; color:#a7f3d0; font-size:13px; border-radius:6px;">
                            <strong>💡 Финстратегия:</strong><br>${d.financial_strategy}<br><br>
                            <strong>🎯 Позиционирование:</strong><br>${d.positioning_in_niche}<br><br>
                            <strong>✅ Действие:</strong> ${d.action_for_entry}
                        </div>
                    </div>
                `;
                
                document.getElementById('result').innerHTML = html;
            })
            .catch(e => {
                document.getElementById('result').innerHTML = `<div class="result"><div class="verdict"><div class="verdict-title">❌ Ошибка</div><div>${e.message}</div></div></div>`;
            });
        }
        
        document.getElementById('search').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
